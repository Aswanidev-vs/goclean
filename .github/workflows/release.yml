name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build and package
        run: |
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p dist

          declare -A TARGETS=(
            ["goclean_${VERSION}_linux_amd64"]="linux/amd64"
            ["goclean_${VERSION}_linux_arm64"]="linux/arm64"
            ["goclean_${VERSION}_darwin_amd64"]="darwin/amd64"
            ["goclean_${VERSION}_darwin_arm64"]="darwin/arm64"
            ["goclean_${VERSION}_windows_amd64"]="windows/amd64"
            ["goclean_${VERSION}_windows_arm64"]="windows/arm64"
          )

          for NAME in "${!TARGETS[@]}"; do
            GOOS="${TARGETS[$NAME]%%/*}"
            GOARCH="${TARGETS[$NAME]##*/}"
            EXT=""
            if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
            OUT="dist/${NAME}"
            mkdir -p "$OUT"
            CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH \
              go build -ldflags "-s -w -X main.version=${VERSION}" \
              -o "${OUT}/goclean${EXT}" .
            cd dist && tar czf "${NAME}.tar.gz" "$NAME" && cd ..
          done

          cd dist && rm -rf goclean_*_*_* && cd ..

      - name: Generate checksums
        run: cd dist && sha256sum *.tar.gz > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/checksums.txt
